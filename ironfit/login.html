<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Iron Fit Gym</title>
<meta name="description" content="Login to your Iron Fit Gym member account.">
<link rel="icon" type="image/png" href="assets/images/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-glass scrolled">
  <div class="container">
    <a class="navbar-brand-custom" href="index.html">IRON<span>FIT</span> GYM</a>
    <a href="index.html" class="btn-outline-custom py-2 px-3 small"><i class="fa-solid fa-arrow-left me-2"></i>Back to site</a>
  </div>
</nav>

<section class="d-flex align-items-center" style="min-height:100vh; padding-top:6rem; padding-bottom:3rem; background:radial-gradient(circle at top right, rgba(255,36,56,0.08), transparent 50%), var(--black);">
  <div class="container">
    <div class="auth-card">
      <div class="text-center mb-4">
        <div class="eyebrow justify-content-center">Welcome Back</div>
        <h2 class="section-title" style="font-size:2rem;">Login To Your <span class="slash-underline">Account</span></h2>
      </div>

      <form id="loginForm" novalidate>
        <div class="mb-3">
          <label class="form-label-custom">Email</label>
          <input type="email" class="form-control form-control-custom" required placeholder="you@example.com">
          <div class="invalid-feedback-custom">Please enter a valid email address.</div>
        </div>
        <div class="mb-3">
          <label class="form-label-custom">Password</label>
          <input type="password" class="form-control form-control-custom" required minlength="6" placeholder="••••••••">
          <div class="invalid-feedback-custom">Password must be at least 6 characters.</div>
        </div>
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="rememberMe">
            <label class="form-check-label small text-muted-custom" for="rememberMe">Remember Me</label>
          </div>
          <a href="#" class="small text-red-custom">Forgot Password?</a>
        </div>
        <button type="submit" class="btn-gradient w-100">Login</button>
      </form>

      <p class="text-center text-muted-custom small mt-4 mb-0">Don't have an account? <a href="register.html" class="text-red-custom">Register here</a></p>
    </div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/script.js"></script>
</body>
</html>
